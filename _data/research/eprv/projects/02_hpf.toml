description = "A near-infrared spectrograph on the Hobby-Eberly Telescope designed to detect low-mass planets orbiting M dwarf stars in their habitable zones. Our group contributes stellar-variability mitigation methods and Bayesian orbit-fitting pipelines to the HPF science program."
